<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Documents</title>

<style>
body{
 font-family:Segoe UI, sans-serif;
 background:#f5f7fb;
 margin:0;
 padding:20px;
}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:20px;
}

button{
 padding:8px 12px;
 border:none;
 border-radius:6px;
 cursor:pointer;
}

.primary{background:#4f46e5;color:white;}

.panel{
 background:white;
 padding:15px;
 border-radius:10px;
 margin-bottom:20px;
 box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

select{
 padding:10px;
 margin-right:10px;
 border-radius:6px;
 border:1px solid #ccc;
}

/* CARD GRID */
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:20px;
}

.card{
 background:white;
 padding:20px;
 border-radius:12px;
 box-shadow:0 4px 10px rgba(0,0,0,0.1);
 text-align:center;
 cursor:pointer;
 transition:0.2s;
}

.card:hover{
 transform:translateY(-5px);
}

.card h3{
 margin:10px 0;
}

.info{
 font-size:12px;
 color:#666;
 margin-top:5px;
}
</style>

</head>

<body>

<div class="header">
 <h2>Documents</h2>
 <button class="primary" onclick="location='dashboard.html'">Back</button>
</div>

<!-- FILTER PANEL -->
<div class="panel">

<select id="category">
 <option>Skilled</option>
 <option>Semi-Skilled</option>
 <option>Unskilled</option>
</select>

<select id="year"></select>

<select id="month"></select>

</div>

<!-- DOCUMENT CARDS -->
<div class="grid">

<div class="card" onclick="openDoc('invoice.html')">
 <h3>Invoice</h3>
 <div class="info">Salary invoice</div>
</div>

<div class="card" onclick="openDoc('certificate.html')">
 <h3>Certificate</h3>
 <div class="info">General certificate</div>
</div>

<div class="card" onclick="openDoc('satisfactory.html')">
 <h3>Satisfactory Certificate</h3>
 <div class="info">Work confirmation</div>
</div>

<div class="card" onclick="openDoc('monthly_report.html')">
 <h3>Monthly Report</h3>
 <div class="info">Month-wise report</div>
</div>

<div class="card" onclick="openDoc('present_days.html')">
 <h3>Present Days</h3>
 <div class="info">Attendance summary</div>
</div>

</div>

<script>

// 🔐 ADMIN ONLY
if(localStorage.getItem("role")!=="ADMIN"){
 document.body.innerHTML="<h2 style='color:red;text-align:center;margin-top:50px;'>Only Admin Can Access</h2>";
}

// INIT YEAR + MONTH
const yearSel = document.getElementById("year");
const monthSel = document.getElementById("month");

const currentYear = new Date().getFullYear();

for(let y=currentYear-2;y<=currentYear+5;y++){
 yearSel.innerHTML += `<option>${y}</option>`;
}

["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
.forEach((m,i)=>{
 monthSel.innerHTML += `<option value="${i}">${m}</option>`;
});

yearSel.value = currentYear;
monthSel.value = new Date().getMonth();

// OPEN DOCUMENT WITH FILTER DATA
function openDoc(page){

 const category = document.getElementById("category").value;
 const year = document.getElementById("year").value;
 const month = document.getElementById("month").value;

 // store selection globally
 localStorage.setItem("docSelection", JSON.stringify({
  category,
  year,
  month
 }));

 // open page
 location = page;
}

</script>

</body>
</html>
