<!DOCTYPE html>
<html>
<head>
<title>Invoice</title>

<style>
body{font-family:Arial;}

.top{
 text-align:center;
 line-height:1.4;
 margin-top:10px;
}

table{
 border-collapse:collapse;
 width:95%;
 margin:20px auto;
 font-size:13px;
}

td,th{
 border:1px solid #000;
 padding:5px;
 text-align:center;
}

.bold{font-weight:bold;}
.left{text-align:left;}
.right{text-align:right;}

button{margin:10px;}
</style>
</head>

<body>

<button onclick="window.print()">Print</button>

<div class="top">
<b>Contract No.511687761569464 Dt. 17 Oct 2025</b><br>
Manpower Outstanding Services - Data Entry Operators (<span id="cat"></span>) - <span id="count"></span> Nos.<br>
Contract Period 24 Oct 2025 to 23 Oct 2027 - 26 days<br>
M/s Vishal Manpower and Security Consultants, Mangalore<br>
Payment for the period <span id="period"></span>
</div>

<table id="tbl"></table>

<script>

// ===== DATE FORMAT =====
function getPeriod(year, month){
 const start = new Date(year, month, 1);
 const end = new Date(year, month+1, 0);

 const opt = {day:'2-digit', month:'short', year:'numeric'};

 return `${start.toLocaleDateString('en-GB',opt)} to ${end.toLocaleDateString('en-GB',opt)}`;
}

// ===== LOAD DATA =====
function load(){

 const data = JSON.parse(localStorage.getItem("finalData")||"{}");

 const RATE = Number(data.rate)||0;
 const emps = data.employees||[];
 const category = data.category || "Skilled";

 const year = data.year || new Date().getFullYear();
 const month = data.month || new Date().getMonth();

 document.getElementById("cat").innerText = category;
 document.getElementById("count").innerText = emps.length;
 document.getElementById("period").innerText = getPeriod(year,month);

 // ===== GROUP SAME LIKE YOUR BILL =====
 let group = {};
 let totalDays = 0;
 let base = 0;

 emps.forEach(e=>{
  const d = e.days || 0;

  if(!group[d]) group[d] = 0;
  group[d]++;

  totalDays += d;
  base += d * RATE;
 });

 let rows="";
 let i=1;

 Object.keys(group).sort((a,b)=>b-a).forEach(d=>{
  const people = group[d];
  const total = people * d;

  rows+=`
  <tr>
   <td>${i++}</td>
   <td>${RATE}</td>
   <td>${people}</td>
   <td>${d}</td>
   <td>${total}</td>
  </tr>`;
 });

 // ===== PF CALC =====
 let pfHigh=0,pfLow=0,high=0,low=0;

 emps.forEach(e=>{
  const wage = e.days * RATE;

  if(wage > 15000){
    pfHigh += 1800;
    high++;
  }else{
    pfLow += wage * 0.13;
    low++;
  }
 });

 const pf = pfHigh + pfLow;
 const sub = base + pf;
 const service = sub * 0.0385;
 const gst = (sub + service) * 0.18;
 const total = sub + service + gst;

 // ===== TABLE =====
 tbl.innerHTML = `
 <tr>
  <th>Sl No</th>
  <th>Description</th>
  <th>Payment per person / month (Rs${RATE}/-PD)</th>
  <th>No of people</th>
  <th>No of Days/Individual</th>
  <th>Total No. of working days</th>
 </tr>

 ${rows}

 <tr>
  <td colspan="3" class="bold">Total No of People</td>
  <td>${emps.length}</td>
  <td class="bold">Total No of Days</td>
  <td>${totalDays}</td>
 </tr>

 <tr>
  <td colspan="5">${RATE} × ${totalDays}</td>
  <td>${base.toFixed(2)}</td>
 </tr>

 <tr>
  <td colspan="5">EPF @13% for ${high} persons</td>
  <td>${pfHigh.toFixed(2)}</td>
 </tr>

 <tr>
  <td colspan="5">EPF @13% for ${low} persons</td>
  <td>${pfLow.toFixed(2)}</td>
 </tr>

 <tr>
  <td colspan="5" class="bold">Sub Total</td>
  <td>${sub.toFixed(2)}</td>
 </tr>

 <tr>
  <td colspan="5">Service Charge @ 3.85%</td>
  <td>${service.toFixed(2)}</td>
 </tr>

 <tr>
  <td colspan="5">GST @ 18%</td>
  <td>${gst.toFixed(2)}</td>
 </tr>

 <tr>
  <td colspan="5" class="bold">Total Cost Per Month</td>
  <td class="bold">${total.toFixed(2)}</td>
 </tr>
 `;
}

load();

</script>

</body>
</html>
